[pytest]
# Pytest configuration for ACIS-X

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    unit: Unit tests that don't require Kafka broker (run locally)
    integration: Integration tests that require Kafka broker (run with docker-compose)
    schema: Database schema tests
    kafka: Kafka client tests
    slow: Slow tests that should be run separately

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    -ra

# Ignore directories
testpaths = tests

# Coverage options
# Can run with: pytest --cov=agents --cov=runtime --cov=schemas
# xfail_strict = true
